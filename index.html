<script>
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {
    console.log(data);

    document.body.innerHTML = `
      <h2>IP Location</h2>
      <p>IP: ${data.ip}</p>
      <p>City: ${data.city}</p>
      <p>Region: ${data.region}</p>
      <p>Country: ${data.country_name}</p>
      <p>Latitude: ${data.latitude}</p>
      <p>Longitude: ${data.longitude}</p>
    `;
  });
</script>
