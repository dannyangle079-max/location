<script>
var apiKey = "DDEB2B70DB5637BDDDB4204E9C5CD7F1";
fetch(`https://api.ip2location.io/?key=${apiKey}`)
  .then(res => res.json())
  .then(data => {
    console.log(data);

    document.body.innerHTML = `
      <p>IP: ${data.ip}</p>
      <p>City: ${data.city_name}</p>
      <p>Country: ${data.country_name}</p>
    `;
  });
</script>
